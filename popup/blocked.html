<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Site Blocked - ClamAV Shield</title>
    <link rel="stylesheet" href="popup.css">
    <style>
        body {
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0e14;
            margin: 0;
            overflow: hidden;
            color: #e0e6ed;
            font-family: 'Outfit', sans-serif;
        }

        .container {
            max-width: 500px;
            text-align: center;
            padding: 40px;
            background: rgba(21, 28, 38, 0.8);
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(239, 68, 68, 0.3);
            backdrop-filter: blur(10px);
        }

        .icon {
            font-size: 64px;
            margin-bottom: 20px;
            animation: pulse 2s infinite;
        }

        h1 {
            color: #ef4444;
            margin-top: 0;
        }

        .details {
            background: rgba(239, 68, 68, 0.1);
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
            font-family: monospace;
            word-break: break-all;
            font-size: 14px;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        button {
            background: #ef4444;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        button:hover {
            background: #dc2626;
            transform: translateY(-2px);
        }

        .secondary {
            display: block;
            margin-top: 15px;
            color: #94a3b8;
            text-decoration: none;
            font-size: 13px;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.1);
            }

            100% {
                transform: scale(1);
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="icon">🛑</div>
        <h1>Dangerous Site Blocked</h1>
        <p>ClamAV Shield has proactively blocked access to this website because it is known to distribute malware.</p>

        <div class="details">
            <strong>Target:</strong> <span id="target-url"></span><br>
            <strong>Reason:</strong> <span id="reason"></span>
        </div>

        <button id="go-back">Go Back to Safety</button>
        <a href="#" class="secondary" id="proceed-anyway">Proceed anyway (Not recommended)</a>
    </div>

    <script src="blocked.js"></script>
</body>

</html>
